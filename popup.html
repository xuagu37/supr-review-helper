<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body { font-family: sans-serif; width: 1000px; padding: 10px; }
      button { width: 100%; margin: 6px 0; padding: 8px; }
      textarea { width: 100%; height: 220px; margin-top: 6px; }
      .small { font-size: 12px; color: #555; margin-top: 6px; }
      .row { display: flex; gap: 8px; }
      .row button { width: 50%; }
    </style>
  </head>
  <body>
    <div class="small" id="status">Ready.</div>

    <button id="scrape">Scrape proposal (current page)</button>

    <div class="row">
      <button id="show">Show stored</button>
      <button id="clear">Clear stored</button>
    </div>

    <button id="generate">Generate answers (Llama3 local)</button>

    <textarea id="preview" placeholder="Scraped proposal / generated draft will appear here..."></textarea>

    <script src="popup.js"></script>
  </body>
</html>
